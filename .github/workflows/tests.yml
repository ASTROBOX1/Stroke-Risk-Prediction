name: Python Tests & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    # إضافة مهلة زمنية (30 دقيقة) لمنع التعلق المفاجئ
    timeout-minutes: 30 
    
    strategy:
      matrix:
        # استخدام النسخ المستقرة والأكثر شيوعاً
        python-version: ['3.9', '3.10'] 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # تحديث للنسخة الرابعة

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5 # تحديث للنسخة الخامسة
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # الكاش يقلل وقت التحميل في المرات القادمة

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # تثبيت أدوات الفحص والاختبار مسبقاً لضمان توفرها
        pip install flake8 mypy pytest pytest-cov
        # التثبيت باستخدام --no-cache-dir لتقليل استهلاك الـ RAM داخل الـ Runner
        if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # فحص الأخطاء البرمجية القاتلة (E9, F63, F7, F82)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # تنبيهات التنسيق (اختياري، لن يوقف العملية)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type Check with mypy
      run: |
        # تجاوز أخطاء المكتبات الخارجية المفقودة لضمان استمرار الـ Build
        mypy . --ignore-missing-imports || true

    - name: Run tests with pytest
      run: |
        # التأكد من وجود مجلد tests قبل التشغيل لتجنب خطأ "Not Found"
        if [ -d "tests" ]; then
          pytest tests/ -v --tb=short --cov=. --cov-report=xml
        else
          echo "No tests directory found, skipping pytest."
        fi

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4 # تحديث للنسخة الرابعة
      if: matrix.python-version == '3.9'
      with:
        file: ./coverage.xml
        # تأكد من إضافة CODECOV_TOKEN في Settings > Secrets > Actions
        token: ${{ secrets.CODECOV_TOKEN }} 
        fail_ci_if_error: false # لكي لا يفشل الـ Build كاملاً إذا فشل الرفع لـ Codecov
