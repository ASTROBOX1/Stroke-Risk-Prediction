name: Python Tests & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # تقليل النسخ يوفر وقت الـ Build إلا لو كنت مهتماً بالتوافق التام
        python-version: ['3.9', '3.10'] 

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # 🔥 تفعيل الكاش التلقائي لسرعة التحميل في المرات القادمة

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # استخدم --no-cache-dir لتقليل استهلاك الـ RAM أثناء التثبيت الأول
        pip install --no-cache-dir -r requirements.txt

    - name: Lint & Type Check (Combined)
      run: |
        pip install flake8 mypy
        # فحص الأخطاء القاتلة فقط
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # تجاوز أخطاء النوع إذا لم تكن حرجة
        mypy . --ignore-missing-imports || true

    - name: Run tests with pytest
      run: |
        pip install pytest pytest-cov
        # تأكد أن مجلد tests موجود فعلاً في الريبو
        pytest tests/ -v --tb=short --cov=. --cov-report=xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.9'
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }} # تأكد من إضافة التوكن في Secrets
